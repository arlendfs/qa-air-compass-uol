name: ServeRest API Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Full regression every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      tags:
        description: "Robot Framework tag filter (e.g. smoke, regression, security)"
        required: false
        default: "regression"
      environment:
        description: "Target environment"
        required: false
        default: "staging"
        type: choice
        options: [staging, production]

env:
  BASE_URL_STAGING:    https://compassuol.serverest.dev
  BASE_URL_PRODUCTION: https://serverest.onrender.com
  PYTHON_VERSION: "3.11"

jobs:
  # ── Job 1: Smoke — fast gate on every push ──────────────────────────────────
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: Documentos/Fase_02/Sprint_02/Semana_04/Challenge_3
        run: pip install -r requirements.txt

      - name: Run smoke tests
        working-directory: Documentos/Fase_02/Sprint_02/Semana_04/Challenge_3
        run: |
          robot \
            --include smoke \
            --variable BASE_URL:${{ env.BASE_URL_STAGING }} \
            --outputdir logs/smoke \
            --output output.xml \
            --log log.html \
            --report report.html \
            tests/
        continue-on-error: false

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: Documentos/Fase_02/Sprint_02/Semana_04/Challenge_3/logs/smoke/
          retention-days: 7

  # ── Job 2: Regression — full suite on PR and schedule ───────────────────────
  regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke
    if: github.event_name != 'push' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: Documentos/Fase_02/Sprint_02/Semana_04/Challenge_3
        run: pip install -r requirements.txt

      - name: Run regression tests (excluding performance)
        working-directory: Documentos/Fase_02/Sprint_02/Semana_04/Challenge_3
        run: |
          robot \
            --include regression \
            --exclude performance \
            --variable BASE_URL:${{ env.BASE_URL_STAGING }} \
            --outputdir logs/regression \
            --output output.xml \
            --log log.html \
            --report report.html \
            tests/

      - name: Upload regression results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results
          path: Documentos/Fase_02/Sprint_02/Semana_04/Challenge_3/logs/regression/
          retention-days: 14

  # ── Job 3: Security — dedicated security gate ───────────────────────────────
  security:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: Documentos/Fase_02/Sprint_02/Semana_04/Challenge_3
        run: pip install -r requirements.txt

      - name: Run security tests
        working-directory: Documentos/Fase_02/Sprint_02/Semana_04/Challenge_3
        run: |
          robot \
            --include security \
            --variable BASE_URL:${{ env.BASE_URL_STAGING }} \
            --outputdir logs/security \
            --output output.xml \
            --log log.html \
            --report report.html \
            tests/05_security.robot

      - name: Upload security results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-results
          path: Documentos/Fase_02/Sprint_02/Semana_04/Challenge_3/logs/security/
          retention-days: 30

  # ── Job 4: Performance — scheduled only ─────────────────────────────────────
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: regression
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: Documentos/Fase_02/Sprint_02/Semana_04/Challenge_3
        run: pip install -r requirements.txt

      - name: Run performance tests
        working-directory: Documentos/Fase_02/Sprint_02/Semana_04/Challenge_3
        run: |
          robot \
            --include performance \
            --variable BASE_URL:${{ env.BASE_URL_STAGING }} \
            --variable SLA_FAST:500 \
            --variable SLA_NORMAL:1000 \
            --variable SLA_SLOW:2000 \
            --outputdir logs/performance \
            --output output.xml \
            --log log.html \
            --report report.html \
            tests/07_performance.robot

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: Documentos/Fase_02/Sprint_02/Semana_04/Challenge_3/logs/performance/
          retention-days: 30

  # ── Job 5: Manual dispatch with custom tag filter ───────────────────────────
  custom:
    name: Custom Tag Run (${{ github.event.inputs.tags }})
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: Documentos/Fase_02/Sprint_02/Semana_04/Challenge_3
        run: pip install -r requirements.txt

      - name: Resolve target URL
        id: env
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            echo "url=${{ env.BASE_URL_PRODUCTION }}" >> $GITHUB_OUTPUT
          else
            echo "url=${{ env.BASE_URL_STAGING }}" >> $GITHUB_OUTPUT
          fi

      - name: Run custom tag filter
        working-directory: Documentos/Fase_02/Sprint_02/Semana_04/Challenge_3
        run: |
          robot \
            --include ${{ github.event.inputs.tags }} \
            --variable BASE_URL:${{ steps.env.outputs.url }} \
            --outputdir logs/custom \
            --output output.xml \
            --log log.html \
            --report report.html \
            tests/

      - name: Upload custom results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: custom-results-${{ github.event.inputs.tags }}
          path: Documentos/Fase_02/Sprint_02/Semana_04/Challenge_3/logs/custom/
          retention-days: 7
